<?xml version="1.0" encoding="UTF-8"?>
<!--
  Section Transition Mask — used by View Transitions API CSS to drive
  a Perlin-noise sweep instead of a flat cross-fade.

  Layout: 100×200 viewBox. Top half is BLACK (mask hidden), bottom
  half is WHITE (mask visible). The boundary between the two halves
  is distorted by feTurbulence + feDisplacementMap so the sweep
  reveals on an irregular, organic edge instead of a hard horizontal
  line.

  Animation: CSS animates `mask-position` from `0% 100%` (mask shows
  the BLACK top half → new frame hidden) to `0% 0%` (mask shows the
  WHITE bottom half → new frame fully visible). Combined with the
  turbulence displacement, the new frame "tears in" through a noise
  edge moving bottom-to-top.

  preserveAspectRatio="none" lets the mask stretch to the viewport
  ratio so it works at any aspect.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#000"/>
      <stop offset="0.46" stop-color="#000"/>
      <stop offset="0.50" stop-color="#fff"/>
      <stop offset="0.54" stop-color="#fff"/>
      <stop offset="1"    stop-color="#fff"/>
    </linearGradient>
    <filter id="n" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.10" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="38" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="100" height="200" fill="url(#g)" filter="url(#n)"/>
</svg>
